{% extends "base.html" %}
{% block mainBody %}
    <ul>
 {% if categories %}
 {% for c in categories %}
     <li><a href="{% url 'rango:show_category' c.slug %}">{{ c.name }}</a></li>
 {% endfor %}
 {% else %}
 <li><strong>There are no categories present.</strong></li>
     {% endif %}
 </ul>
<div>
{% block sidebar_block %}
{% get_category_list %}
{% endblock %}
</div>


{% endblock mainBody %}
